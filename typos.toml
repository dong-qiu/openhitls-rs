[files]
extend-exclude = [
    "tests/vectors/",
    "fuzz/corpus/",
    "*.json",
    "*.lock",
    "supply-chain/",
]

[default.extend-words]
# Cryptographic terms that are not typos
ede = "ede"       # Triple-DES EDE mode
ba = "ba"         # Hex byte
ot = "ot"         # Oblivious transfer
nd = "nd"         # Bignum variable
numer = "numer"   # Numerator in math
datas = "datas"   # Plural in protocol specs
keypair = "keypair"
flate = "flate"   # deflate/inflate compression
benchs = "benchs" # informal plural of bench
testca = "testca" # test CA certificate
testin = "testin" # test input abbreviation
adin = "adin"     # additional_input abbreviation in DRBG
fo = "fo"         # variable/abbreviation in crypto code
Fo = "Fo"         # capitalized variant
Slq = "Slq"       # SLQ abbreviation in PQ crypto
unparseable = "unparseable" # valid alternate spelling
UE = "UE"         # ML-KEM/ML-DSA parameter (e.g. MLKEM_UE)
MSIS = "MSIS"     # Module-SIS lattice problem
Iin = "Iin"       # variable name in protocol code
Alo = "Alo"       # variable/abbreviation
Iy = "Iy"         # variable name
PASSWOR = "PASSWOR" # RFC 6070 PBKDF2 test vector password string

[type.markdown]
extend-glob = ["*.md"]
[type.markdown.extend-words]
# Phase numbering abbreviations in docs
PN = "PN"         # Phase Number prefix
FO = "FO"         # abbreviation in docs

[default.extend-identifiers]
# Variable names in crypto code
nIn = "nIn"
pOut = "pOut"
