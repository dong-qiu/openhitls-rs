[files]
extend-exclude = [
    "tests/vectors/",
    "fuzz/corpus/",
    "*.json",
    "*.lock",
    "supply-chain/",
    # Pure continuous-hex FIPS KAT vectors (NIST FIPS 203/205); hex strings
    # like "4ded…" spuriously match dictionary words ("ded" -> "dead").
    "crates/hitls-crypto/src/fips/kat_vectors.rs",
]

[default.extend-words]
# Cryptographic terms that are not typos
ede = "ede"       # Triple-DES EDE mode
ba = "ba"         # Hex byte
ot = "ot"         # Oblivious transfer
nd = "nd"         # Bignum variable
numer = "numer"   # Numerator in math
datas = "datas"   # Plural in protocol specs
keypair = "keypair"
flate = "flate"   # deflate/inflate compression
benchs = "benchs" # informal plural of bench
testca = "testca" # test CA certificate
testin = "testin" # test input abbreviation
adin = "adin"     # additional_input abbreviation in DRBG
fo = "fo"         # variable/abbreviation in crypto code
Fo = "Fo"         # capitalized variant
Slq = "Slq"       # SLQ abbreviation in PQ crypto
unparseable = "unparseable" # valid alternate spelling
UE = "UE"         # ML-KEM/ML-DSA parameter (e.g. MLKEM_UE)
MSIS = "MSIS"     # Module-SIS lattice problem
Iin = "Iin"       # variable name in protocol code
Alo = "Alo"       # variable/abbreviation
Iy = "Iy"         # variable name
PASSWOR = "PASSWOR" # RFC 6070 PBKDF2 test vector password string
Parms = "Parms"     # RFC 3279 ASN.1 type name (validationParms / ValidationParms)
# Upstream tlsfuzzer identifiers that contain typos but must be referenced verbatim
symetric = "symetric"     # upstream script name: test-tls13-symetric-ciphers.py
extentions = "extentions" # upstream script name: test-tls13-shuffled-extentions.py
exhange = "exhange"       # upstream conversation name: "psk_key exhange modes"
# Upstream openHiTLS C symbols that contain typos but must be referenced verbatim
UNKOWN = "UNKOWN"         # C source symbol: HITLS_APP_OPT_UNKOWN (apps/include/app_errno.h)
VERISON = "VERISON"       # C source symbol: SDV_CMS_SIGNEDATA_VERIFY_WITH_INVALID_VERISON_TC001
UNEXPECT = "UNEXPECT"     # C source symbol prefix: UT_TLS_TLCP_CONSISTENCY_UNEXPECT_HANDSHAKEMSG / _RECORDTYPE
UNEXPETED = "UNEXPETED"   # C source symbol: UT_TLS_DTLS_CONSISTENCY_RFC5246_UNEXPETED_REORD_TYPE_TC001
REORD = "REORD"           # C source symbol: UT_TLS_DTLS_CONSISTENCY_RFC5246_UNEXPETED_REORD_TYPE_TC001
UNSUPPORT = "UNSUPPORT"   # C source symbol: UT_TLS_SDV_TLS1_3_RFC8446_CONSISTENCY_UNSUPPORT_VERSION_TC001
CERTICATE = "CERTICATE"   # C source symbol: UT_TLS_TLS13_RFC8446_CONSISTENCY_CERTICATE_VERIFY_FAIL_FUNC_TC001
HEELO = "HEELO"           # C source symbol prefix: UT_TLS_TLS13_RFC8446_CONSISTENCY_ERR_HEELO_FUNC_TC001-004
BEWTEEN = "BEWTEEN"       # C source symbol: UT_TLS_TLS1_2_RFC5246_SEND_DATA_BEWTEEN_CCS_AND_FINISH
CERTFICATE = "CERTFICATE" # C source symbol: UT_TLS_TLCP_CONSISTENCY_CERTFICATE_TC*
# OpenSSL-compatible CLI flag names referenced verbatim (these are stable
# external interface tokens, not typos in our prose)
passin = "passin"         # OpenSSL CLI flag: openssl pkey -passin pass:...
passout = "passout"       # OpenSSL CLI flag: openssl pkey -passout pass:...

[type.markdown]
extend-glob = ["*.md"]
[type.markdown.extend-words]
# Phase numbering abbreviations in docs
PN = "PN"         # Phase Number prefix
FO = "FO"         # abbreviation in docs

[default.extend-identifiers]
# Variable names in crypto code
nIn = "nIn"
pOut = "pOut"
