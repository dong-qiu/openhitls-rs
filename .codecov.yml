# Codecov configuration for openHiTLS-rs
# Docs: https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 88%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%

  # Exclude test vector data files and non-source directories from coverage
  ignore:
    - "tests/vectors/**"
    - "fuzz/**"
    - "benches/**"
    - "**/proptest-regressions/**"

# Component-level coverage tracking
component_management:
  individual_components:
    - component_id: hitls-crypto
      name: Cryptographic Algorithms
      paths:
        - crates/hitls-crypto/src/**
    - component_id: hitls-tls
      name: TLS Protocol
      paths:
        - crates/hitls-tls/src/**
    - component_id: hitls-pki
      name: PKI / X.509
      paths:
        - crates/hitls-pki/src/**
    - component_id: hitls-cli
      name: CLI Tool
      paths:
        - crates/hitls-cli/src/**
    - component_id: hitls-bignum
      name: Big Number Arithmetic
      paths:
        - crates/hitls-bignum/src/**
    - component_id: hitls-utils
      name: Utilities
      paths:
        - crates/hitls-utils/src/**
    - component_id: hitls-auth
      name: Authentication
      paths:
        - crates/hitls-auth/src/**
    - component_id: hitls-types
      name: Shared Types
      paths:
        - crates/hitls-types/src/**

comment:
  layout: "reach, diff, flags"
  behavior: default
  require_changes: false
