version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # MSRV is held at 1.75 (see README "MSRV" section). The versions below
    # require Rust 1.85, so dependabot must not propose them while the MSRV
    # holds. Remove the matching entry when the MSRV is raised.
    ignore:
      - dependency-name: getrandom
        versions: [">=0.4"]
      - dependency-name: proptest
        versions: [">=1.9"]
      - dependency-name: zeroize
        versions: [">=1.9"]
      - dependency-name: clap
        versions: [">=4.6"]
      - dependency-name: criterion
        update-types: ["version-update:semver-major"]

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Same MSRV-driven holds as the root workspace (the fuzz crate shares the
    # 1.75 floor in CI).
    ignore:
      - dependency-name: getrandom
        versions: [">=0.4"]
      - dependency-name: zeroize
        versions: [">=1.9"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
