name: Commit Lint

# Trunk-based: the team never opens PRs, so commit messages are validated
# on push (over the range this push introduced). `pull_request` is kept so
# external contributor PRs are still checked.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check pushed commit messages
        run: |
          # Validate every non-merge commit this push introduced against
          # the Conventional Commits prefix set.
          BEFORE='${{ github.event.before }}'
          case "$BEFORE" in
            ''|0000000000000000000000000000000000000000)
              # First push / unknown parent: check the tip commit only.
              RANGE='-1' ;;
            *)
              RANGE="$BEFORE..${{ github.sha }}" ;;
          esac
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          COMMITS=$(git log --no-merges --format='%H %s' $RANGE)
          FAIL=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            subject=${line#* }
            if printf '%s' "$subject" | grep -Eq "$PATTERN"; then
              echo "ok:   $subject"
            else
              echo "::error::non-conventional commit subject: $subject"
              FAIL=1
            fi
          done <<< "$COMMITS"
          [ $FAIL -eq 0 ] || { echo "::error::one or more commits violate Conventional Commits"; exit 1; }
