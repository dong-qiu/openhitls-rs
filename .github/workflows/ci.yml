name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.75"]
        # MSRV (1.75) breakage is compiler-version-specific, not OS-specific:
        # a too-new stdlib/language feature fails identically on every OS.
        # Verify MSRV on Linux only; keep full 3-OS coverage on stable.
        exclude:
          - { os: macos-latest, rust: "1.75" }
          - { os: windows-latest, rust: "1.75" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # Doc tests + the no-default-features smoke are OS-independent and run
      # once in the `test-extras` job. Keeping them out of this matrix means
      # each cell does a single compile cycle instead of three.
      - run: cargo nextest run --workspace --all-features --profile ci

  test-extras:
    name: Doc Tests + No-Default-Features
    # OS-independent test cycles split out of the `test` matrix so the
    # (slow) Windows/macOS cells each compile once instead of three times.
    # A doc-test failure or a missing `#[cfg(feature)]` gate manifests
    # identically on every OS, so a single Linux run is sufficient coverage.
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Doc tests (all features)
        run: cargo test --doc --workspace --all-features
      - name: No-default-features smoke
        run: cargo nextest run --workspace --no-default-features --profile ci

  test-features:
    name: "Features: ${{ matrix.group }}"
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [crypto-single, crypto-advanced, tls-protocol, pki-auth]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: crypto-single
        if: matrix.group == 'crypto-single'
        run: |
          cargo test -p hitls-crypto --features aes
          cargo test -p hitls-crypto --features sha2
          cargo test -p hitls-crypto --features rsa
          cargo test -p hitls-crypto --features sm2
          cargo test -p hitls-crypto --features pqc
          cargo test -p hitls-crypto --features aes,sha2
          cargo test -p hitls-crypto --features rsa,ecdsa
          cargo test -p hitls-crypto --features sm2,sm4
          cargo test -p hitls-crypto --no-default-features --features dh
          cargo test -p hitls-crypto --no-default-features --features dsa
          cargo test -p hitls-crypto --no-default-features --features ed25519
          cargo test -p hitls-crypto --no-default-features --features ed448
          cargo test -p hitls-crypto --no-default-features --features sm3
          cargo test -p hitls-crypto --no-default-features --features sm4
          cargo test -p hitls-crypto --no-default-features --features chacha20
          cargo test -p hitls-crypto --no-default-features --features cmac
          cargo test -p hitls-crypto --no-default-features --features scrypt
          cargo test -p hitls-crypto --no-default-features --features entropy
      - name: crypto-advanced
        if: matrix.group == 'crypto-advanced'
        run: |
          cargo test -p hitls-crypto --no-default-features --features aes,modes
          cargo test -p hitls-crypto --no-default-features --features pqc,ecdsa
          cargo test -p hitls-crypto --no-default-features --features sha1
          cargo test -p hitls-crypto --no-default-features --features sha3
          cargo test -p hitls-crypto --no-default-features --features ecdh
          cargo test -p hitls-crypto --no-default-features --features x25519
          cargo test -p hitls-crypto --no-default-features --features x448
          cargo test -p hitls-crypto --no-default-features --features hkdf
          cargo test -p hitls-crypto --no-default-features --features pbkdf2
          cargo test -p hitls-crypto --no-default-features --features sm9
          cargo test -p hitls-crypto --no-default-features --features frodokem
          cargo test -p hitls-crypto --no-default-features --features mceliece
          cargo test -p hitls-crypto --no-default-features --features drbg
          cargo test -p hitls-crypto --no-default-features --features fips
          cargo test -p hitls-crypto --no-default-features --features hybridkem
          cargo test -p hitls-crypto --no-default-features --features hpke
          cargo test -p hitls-crypto --no-default-features --features xmss
          cargo test -p hitls-crypto --no-default-features --features gmac
          cargo test -p hitls-crypto --no-default-features --features cbc-mac
          cargo test -p hitls-crypto --no-default-features --features siphash
          cargo test -p hitls-crypto --no-default-features --features elgamal
          cargo test -p hitls-crypto --no-default-features --features paillier
          cargo test -p hitls-crypto --no-default-features --features md5
          cargo test -p hitls-crypto --no-default-features --features aes,modes,sha2
      - name: tls-protocol
        if: matrix.group == 'tls-protocol'
        run: |
          cargo test -p hitls-tls --features tls13
          cargo test -p hitls-tls --features tls12
          cargo test -p hitls-tls --features tlcp
          cargo test -p hitls-tls --no-default-features
          cargo test -p hitls-tls --no-default-features --features dtls12
          cargo test -p hitls-tls --no-default-features --features sm_tls13
          cargo test -p hitls-tls --no-default-features --features dtlcp
          cargo test -p hitls-tls --no-default-features --features tls13,async
          cargo test -p hitls-tls --no-default-features --features cert-compression
          cargo test -p hitls-tls --no-default-features --features tls12,tls13
          cargo test -p hitls-tls --no-default-features --features tls12,async
          cargo test -p hitls-tls --no-default-features --features tlcp,async
          cargo test -p hitls-tls --no-default-features --features dtlcp,async
      - name: pki-auth
        if: matrix.group == 'pki-auth'
        run: |
          cargo test -p hitls-pki --no-default-features
          cargo test -p hitls-pki --no-default-features --features x509,pkcs8
          cargo test -p hitls-pki --no-default-features --features cms
          cargo test -p hitls-pki --no-default-features --features pkcs12
          cargo test -p hitls-pki --no-default-features --features x509,pkcs8,cms,pkcs12
          cargo test -p hitls-auth --all-features
          cargo test -p hitls-auth --no-default-features --features otp
          cargo test -p hitls-auth --no-default-features --features spake2plus
          cargo test -p hitls-auth --no-default-features --features privpass

  feature-powerset:
    name: Feature Powerset Check
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack
      # Depth 1 (single-feature) on PR/push — catches the common class of
      # missing-feature-gate errors in <1 min. Depth 2 (every pair, ~10 min)
      # runs nightly via the `schedule` trigger.
      - name: Check feature combinations
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            cargo hack check -p hitls-crypto --feature-powerset --depth 2 --no-dev-deps
          else
            cargo hack check -p hitls-crypto --feature-powerset --depth 1 --no-dev-deps
          fi

  minimal-versions:
    name: Minimal Dependency Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@cargo-minimal-versions
      - name: Check with minimal versions
        # `--direct` minimises only our *declared* direct-dependency floors,
        # not the whole transitive graph. Full `-Z minimal-versions` drags
        # transitive deps (`zeroize_derive`, `gcc`, …) down to ancient
        # versions that no longer build on a modern compiler — upstream
        # breakage we cannot fix, and that drowns out the signal we want:
        # "are *our* declared version floors actually accurate?". `--direct`
        # is the documented escape hatch for deps incompatible with full
        # minimal-versions.
        run: cargo minimal-versions check --workspace --all-features --direct

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2026-0097: rand 0.8.5 unsound notice — only pulled as a
          # transitive dev-dependency of proptest, never linked into release
          # binaries; not exploitable from outside test code. Drop when
          # proptest depends on rand >=0.9.3.
          ignore: RUSTSEC-2026-0097

  miri-smoke:
    name: Miri Smoke (PR/push)
    # Fast UB-detection on the core BigNum arithmetic — the module most
    # likely to introduce miri-detectable UB. Full fan-out runs nightly
    # in `miri-full` below.
    if: github.event_name != 'schedule'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo miri test -p hitls-bignum

  miri-full:
    name: "Miri: ${{ matrix.target.name }}"
    # Fan-out across all 14 miri targets in parallel — schedule-only because
    # the previous serial job was the wall-clock bottleneck (~80 min).
    # Parallel execution caps the critical path at the slowest single
    # target (~15-25 min depending on input).
    if: github.event_name == 'schedule'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: bignum,   args: "-p hitls-bignum" }
          - { name: utils,    args: "-p hitls-utils -- --skip prop_" }
          - { name: mceliece, args: "-p hitls-crypto --all-features -- mceliece::benes" }
          - { name: mlkem,    args: "-p hitls-crypto --all-features -- mlkem::ntt::tests --skip neon" }
          - { name: mldsa,    args: "-p hitls-crypto --all-features -- mldsa::ntt::tests --skip neon" }
          - { name: gcm,      args: "-p hitls-crypto --all-features -- modes::gcm" }
          # SHA-2 software path (skip HW cross-validation tests using SIMD)
          - { name: sha2,     args: "-p hitls-crypto --all-features -- sha2::tests --skip compress_soft_vs_dispatch --skip multi_block_consistency" }
          # SHA-3 software path (HW tests are cfg-gated on aarch64, auto-skipped)
          - { name: sha3,     args: "-p hitls-crypto --all-features -- sha3::tests" }
          # ChaCha20 software path (skip HW cross-validation tests using SIMD)
          - { name: chacha20, args: "-p hitls-crypto --all-features -- chacha20::tests --skip soft_vs_dispatch_stress --skip keystream_256_bytes_consistency" }
          # SM3 software path (no SIMD)
          - { name: sm3,      args: "-p hitls-crypto --all-features -- sm3::tests" }
          # SM4 software path (T-table, no intrinsics)
          - { name: sm4,      args: "-p hitls-crypto --all-features -- sm4::tests" }
          # P-256/P-384/P-521 specialized Montgomery field arithmetic (unsafe code)
          - { name: p256,     args: "-p hitls-crypto --all-features -- ecc::p256_field::tests" }
          - { name: p384,     args: "-p hitls-crypto --all-features -- ecc::p384_field::tests" }
          - { name: p521,     args: "-p hitls-crypto --all-features -- ecc::p521_field::tests" }
    env:
      MIRIFLAGS: "-Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo miri test ${{ matrix.target.args }}

  fuzz-check:
    name: Fuzz Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: cd fuzz && cargo check

  fuzz-smoke:
    name: Fuzz Smoke Test
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Run fuzz targets (10s each)
        # `--target` is explicit: the prebuilt cargo-fuzz binary from
        # install-action is musl-linked and otherwise defaults to building
        # fuzz targets for x86_64-unknown-linux-musl, where the sanitizer
        # is incompatible with the statically linked libc. Pin the build to
        # the gnu host target so ASan works.
        run: |
          cd fuzz
          FAILED=0
          for target in $(cargo fuzz list); do
            echo "=== Smoke-testing $target ==="
            timeout 30 cargo fuzz run --target x86_64-unknown-linux-gnu "$target" -- -max_total_time=10 -dict=dictionary/common.dict && continue
            EXIT_CODE=$?
            # Exit 124 = timeout (normal for fuzz), anything else = crash
            if [ $EXIT_CODE -ne 124 ]; then
              echo "::error::CRASH detected in $target (exit code $EXIT_CODE)"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "::error::One or more fuzz targets crashed"
            exit 1
          fi
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-smoke-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore

  coverage:
    name: "Coverage: ${{ matrix.crate }}"
    # Schedule + PR only. Per-crate matrix fan-out: the previous single
    # `cargo llvm-cov --workspace` job took ~31 min, dominated by the
    # serial compile-instrument-test-extract pipeline. Splitting per crate
    # parallelises that pipeline and caps the critical path at the slowest
    # single crate (~10 min for hitls-crypto / hitls-tls). Each matrix
    # entry uploads to Codecov with a `flags` label so the per-component
    # threshold rules in `.codecov.yml` (88% project / 70% patch) still
    # apply correctly to merged data.
    #
    # The previous inline `< 60%` Bash threshold check is dropped — it was
    # redundant with `.codecov.yml` and only echoed warnings; the proper
    # gate is the Codecov status check on the PR.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - hitls-types
          - hitls-utils
          - hitls-bignum
          - hitls-crypto
          - hitls-tls
          - hitls-pki
          - hitls-auth
          - hitls-cli
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache key per crate so concurrent matrix jobs don't
          # thrash a single shared cache entry.
          shared-key: cov-${{ matrix.crate }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage for ${{ matrix.crate }}
        run: |
          mkdir -p coverage
          cargo llvm-cov -p ${{ matrix.crate }} --all-features --branch \
            --codecov --output-path coverage/codecov-${{ matrix.crate }}.json \
            --ignore-filename-regex "tests/vectors/"
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/codecov-${{ matrix.crate }}.json
          flags: ${{ matrix.crate }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  unused-deps:
    name: Unused Dependencies
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: Check for unused dependencies
        run: cargo machete

  deny:
    name: Supply Chain Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  cross-check:
    name: Cross-compile Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-unknown-linux-gnu, i686-unknown-linux-gnu, s390x-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --target ${{ matrix.target }}

  test-aarch64:
    name: Test (aarch64 Linux)
    needs: [fmt, clippy]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests on native aarch64
        run: cargo nextest run --workspace --all-features --profile ci

  wasm-check:
    name: WASM Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check crypto crate compiles for wasm32
        run: cargo check -p hitls-crypto --all-features --target wasm32-unknown-unknown

  doc:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  ignored-tests:
    name: Slow & Ignored Tests
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Slow keygen + zeroize verification (skip timing and flaky tests)
      # Skip test_elgamal_generate: flaky safe-prime generation (BnRandGenFail)
      # Skip constant_time/ct_verify: timing tests run in dedicated job below
      - run: cargo test -p hitls-crypto --all-features -- --ignored --skip test_openssl --skip test_s_client --skip test_elgamal_generate --skip constant_time --skip ct_verify

  openssl-differential:
    name: OpenSSL Differential Tests
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify OpenSSL version
        run: openssl version
      - name: Run differential tests
        run: cargo test -p hitls-integration-tests -- --ignored test_openssl_differential

  timing-tests-core:
    name: Constant-Time Verification (Core)
    # Schedule-only: dudect-style timing tests are extremely noisy on shared
    # GitHub Actions runners (CPU frequency scaling, hyperthread neighbour
    # interference, hypervisor steal time, ~20ns Instant::now() overhead vs
    # ~5-20ns measured operations). On PR/push the |t|-statistic typically
    # lands at 6-150 against a threshold of 4.5 even when the underlying
    # ct_eq is provably constant-time. Industry practice (rustls, ring,
    # BoringSSL) is to run dudect on bare-metal benchmarking hosts, not on
    # cloud CI. We retain the test so nightly runs can flag genuine
    # regressions, but do not block PRs on noise.
    if: github.event_name == 'schedule'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run core timing tests (comparison/verify — advisory)
        run: |
          cargo test -p hitls-crypto --all-features --release -- --ignored --test-threads=1 \
            test_hmac_verify_constant_time \
            test_aes_gcm_tag_verify_constant_time \
            test_bignum_ct_eq_constant_time \
            test_sm4_gcm_tag_verify_constant_time
      - name: Annotate flaky results
        if: failure()
        run: echo "::warning::Timing tests failed — may be CI environment noise (CPU frequency scaling, load)"

  timing-tests-extended:
    name: Constant-Time Verification (Extended)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run all timing tests (release mode, advisory)
        continue-on-error: true
        run: cargo test -p hitls-crypto --all-features --release -- --ignored constant_time ct_verify
      - name: Annotate flaky results
        if: failure()
        run: echo "::warning::Timing tests failed — may be CI environment noise (CPU frequency scaling, load)"

  supply-chain:
    name: Supply Chain Audit (cargo-vet)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-vet
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet
      - name: Run cargo-vet
        run: cargo vet

  sbom:
    name: SBOM Generation + Provenance
    # SBOM + SLSA provenance are release artifacts, not correctness gates —
    # only generate them for the canonical main-branch history, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --all --format json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        id: sbom-upload
        with:
          name: sbom-cyclonedx
          path: ./**/bom.json
          retention-days: 90
      - name: Compute SBOM digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: sbom-digest
        run: |
          # Find the first bom.json and compute its sha256
          SBOM_FILE=$(find . -name "bom.json" -path "*/hitls-crypto/*" | head -1)
          if [ -n "$SBOM_FILE" ]; then
            DIGEST=$(sha256sum "$SBOM_FILE" | cut -d' ' -f1)
            echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
            echo "path=${SBOM_FILE}" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate SLSA provenance attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.sbom-digest.outputs.digest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.sbom-digest.outputs.path }}
          push-to-registry: false

  unsafe-audit:
    name: Unsafe Code Audit (cargo-geiger)
    # Informational only (continue-on-error, advisory report artifact) — the
    # `unsafe` policy is enforced by the pre-push AI review and the crate-list
    # in CLAUDE.md. Run weekly to track the unsafe-count trend rather than on
    # every push.
    if: github.event_name == 'schedule'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-geiger
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-geiger
      - name: Run cargo-geiger report
        run: cargo geiger --all-features --output-format ascii 2>&1 | tee geiger-report.txt || true
      - name: Upload geiger report
        uses: actions/upload-artifact@v7
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 90

  bench:
    name: Benchmark Check
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --all-features --no-run

  semver:
    name: Semver Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        continue-on-error: true
        with:
          package: hitls-types,hitls-utils,hitls-bignum,hitls-crypto,hitls-tls,hitls-pki,hitls-auth

  api-surface:
    name: API Surface Report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Generate API surface reports
        run: |
          mkdir -p api-reports
          for crate in hitls-types hitls-utils hitls-bignum hitls-crypto hitls-tls hitls-pki hitls-auth; do
            cargo public-api -p "$crate" --all-features > "api-reports/${crate}.txt" 2>/dev/null || true
          done
          echo "## API Surface Summary" > api-reports/summary.txt
          for f in api-reports/hitls-*.txt; do
            crate=$(basename "$f" .txt)
            count=$(wc -l < "$f" | tr -d ' ')
            pub_fns=$(grep -c "^pub fn" "$f" || true)
            pub_structs=$(grep -c "^pub struct" "$f" || true)
            echo "$crate: $count items ($pub_fns functions, $pub_structs structs)" >> api-reports/summary.txt
          done
          cat api-reports/summary.txt
      - name: Upload API reports
        uses: actions/upload-artifact@v7
        with:
          name: api-surface-reports
          path: api-reports/

  bench-compare:
    name: Benchmark Comparison
    if: github.event_name == 'pull_request'
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Bench base branch
        run: |
          git checkout ${{ github.base_ref }}
          cargo bench --all-features --bench crypto_bench -- --save-baseline base
      - name: Bench PR head
        run: |
          git checkout ${{ github.sha }}
          cargo bench --all-features --bench crypto_bench -- --save-baseline head
      - name: Install critcmp
        uses: taiki-e/install-action@v2
        with:
          tool: critcmp
      - name: Compare benchmarks
        run: |
          critcmp base head | tee bench-diff.txt
      - name: Check for regressions (>10% slowdown)
        run: |
          if critcmp base head --threshold 10 2>&1 | grep -q "regressed"; then
            echo "::warning::Performance regression detected (>10% slowdown)"
          fi

  careful:
    name: cargo-careful (UB detection)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-careful
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-careful
      - run: cargo careful test -p hitls-bignum
      - run: cargo careful test -p hitls-crypto --features aes,sha2,modes,hmac
      - run: cargo careful test -p hitls-crypto --no-default-features --features rsa
      - run: cargo careful test -p hitls-crypto --no-default-features --features ecdsa,ecdh
      - run: cargo careful test -p hitls-crypto --no-default-features --features pqc

  reproducible-build:
    name: Reproducible Build Verification
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build twice and compare checksums
        run: |
          cargo build --workspace --all-features --release
          sha256sum target/release/libhitls_crypto.rlib > /tmp/build1.sha
          sha256sum target/release/libhitls_bignum.rlib >> /tmp/build1.sha
          sha256sum target/release/libhitls_tls.rlib >> /tmp/build1.sha
          cargo clean
          cargo build --workspace --all-features --release
          sha256sum target/release/libhitls_crypto.rlib > /tmp/build2.sha
          sha256sum target/release/libhitls_bignum.rlib >> /tmp/build2.sha
          sha256sum target/release/libhitls_tls.rlib >> /tmp/build2.sha
          diff /tmp/build1.sha /tmp/build2.sha
        env:
          RUSTFLAGS: ""

  sanitizers-asan:
    name: AddressSanitizer
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with ASan
        env:
          RUSTFLAGS: "-Z sanitizer=address -D warnings"
          RUSTDOCFLAGS: "-Z sanitizer=address"
        run: |
          cargo +nightly test -p hitls-bignum --target x86_64-unknown-linux-gnu
          cargo +nightly test -p hitls-crypto --features aes,sha2,modes,hmac --target x86_64-unknown-linux-gnu
          cargo +nightly test -p hitls-utils --target x86_64-unknown-linux-gnu

  sanitizers-tsan:
    name: ThreadSanitizer
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run TLS tests with TSan
        env:
          RUSTFLAGS: "-Z sanitizer=thread -D warnings"
          TSAN_OPTIONS: "suppressions=tsan_suppressions.txt"
        run: |
          cargo +nightly test -p hitls-tls --all-features --target x86_64-unknown-linux-gnu -- --test-threads=1
        continue-on-error: true

  valgrind-ct:
    name: Valgrind Constant-Time Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Build tests
        run: cargo test -p hitls-crypto --all-features --no-run --release 2>&1 | grep "Executable" | head -3
      - name: Run under Valgrind memcheck
        run: |
          # Run crypto unit tests under Valgrind to detect secret-dependent branches
          TEST_BIN=$(cargo test -p hitls-crypto --features aes,sha2,hmac,modes --no-run --release --message-format=json 2>/dev/null | \
            jq -r 'select(.reason == "compiler-artifact" and .target.kind[] == "lib") | .executable // empty' | tail -1)
          if [ -n "$TEST_BIN" ]; then
            valgrind --tool=memcheck --error-exitcode=0 "$TEST_BIN" --test-threads=1 2>&1 | tail -20
          fi
        continue-on-error: true

  fuzz-run:
    name: Scheduled Fuzzing
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Run fuzz targets (60s each)
        # `--target` explicit: prebuilt cargo-fuzz is musl-linked and would
        # otherwise build fuzz targets for musl, where ASan is incompatible
        # with the statically linked libc. Pin to the gnu host target.
        run: |
          cd fuzz
          for target in $(cargo fuzz list); do
            echo "=== Fuzzing $target ==="
            cargo fuzz run --target x86_64-unknown-linux-gnu "$target" -- -max_total_time=60 -jobs=2 -dict=dictionary/common.dict || true
          done
      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore
