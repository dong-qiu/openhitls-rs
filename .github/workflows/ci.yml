name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.75"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --no-default-features

  test-features:
    name: Test Feature Combinations
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Test individual feature flags for hitls-crypto
      - run: cargo test -p hitls-crypto --features aes
      - run: cargo test -p hitls-crypto --features sha2
      - run: cargo test -p hitls-crypto --features rsa
      - run: cargo test -p hitls-crypto --features sm2
      - run: cargo test -p hitls-crypto --features pqc
      # Test common feature combinations for hitls-crypto
      - run: cargo test -p hitls-crypto --features aes,sha2
      - run: cargo test -p hitls-crypto --features rsa,ecdsa
      - run: cargo test -p hitls-crypto --features sm2,sm4
      # Test individual TLS protocol features
      - run: cargo test -p hitls-tls --features tls13
      - run: cargo test -p hitls-tls --features tls12
      - run: cargo test -p hitls-tls --features tlcp
      # Additional single-feature flags
      - run: cargo test -p hitls-crypto --no-default-features --features dh
      - run: cargo test -p hitls-crypto --no-default-features --features dsa
      - run: cargo test -p hitls-crypto --no-default-features --features ed25519
      - run: cargo test -p hitls-crypto --no-default-features --features ed448
      - run: cargo test -p hitls-crypto --no-default-features --features sm3
      - run: cargo test -p hitls-crypto --no-default-features --features sm4
      - run: cargo test -p hitls-crypto --no-default-features --features chacha20
      - run: cargo test -p hitls-crypto --no-default-features --features cmac
      - run: cargo test -p hitls-crypto --no-default-features --features scrypt
      - run: cargo test -p hitls-crypto --no-default-features --features entropy
      # Cross-feature combinations
      - run: cargo test -p hitls-crypto --no-default-features --features aes,modes
      - run: cargo test -p hitls-crypto --no-default-features --features pqc,ecdsa
      # Additional single-feature isolation
      - run: cargo test -p hitls-crypto --no-default-features --features sha1
      - run: cargo test -p hitls-crypto --no-default-features --features sha3
      - run: cargo test -p hitls-crypto --no-default-features --features ecdh
      - run: cargo test -p hitls-crypto --no-default-features --features x25519
      - run: cargo test -p hitls-crypto --no-default-features --features x448
      - run: cargo test -p hitls-crypto --no-default-features --features hkdf
      - run: cargo test -p hitls-crypto --no-default-features --features pbkdf2
      - run: cargo test -p hitls-crypto --no-default-features --features sm9
      - run: cargo test -p hitls-crypto --no-default-features --features frodokem
      - run: cargo test -p hitls-crypto --no-default-features --features mceliece
      - run: cargo test -p hitls-crypto --no-default-features --features drbg
      - run: cargo test -p hitls-crypto --no-default-features --features fips
      # No-default for TLS/PKI/Auth crates
      - run: cargo test -p hitls-tls --no-default-features
      - run: cargo test -p hitls-tls --no-default-features --features dtls12
      - run: cargo test -p hitls-pki --no-default-features
      - run: cargo test -p hitls-pki --no-default-features --features x509,pkcs8
      - run: cargo test -p hitls-auth --all-features
      # TLS protocol feature isolation
      - run: cargo test -p hitls-tls --no-default-features --features sm_tls13
      - run: cargo test -p hitls-tls --no-default-features --features dtlcp
      - run: cargo test -p hitls-tls --no-default-features --features tls13,async
      - run: cargo test -p hitls-tls --no-default-features --features cert-compression
      # PKI feature isolation
      - run: cargo test -p hitls-pki --no-default-features --features cms
      - run: cargo test -p hitls-pki --no-default-features --features pkcs12
      # Crypto advanced feature isolation
      - run: cargo test -p hitls-crypto --no-default-features --features hybridkem
      - run: cargo test -p hitls-crypto --no-default-features --features hpke
      # T71-C: Additional feature isolation
      - run: cargo test -p hitls-crypto --no-default-features --features xmss
      - run: cargo test -p hitls-crypto --no-default-features --features gmac
      - run: cargo test -p hitls-crypto --no-default-features --features cbc-mac
      - run: cargo test -p hitls-crypto --no-default-features --features siphash
      - run: cargo test -p hitls-crypto --no-default-features --features elgamal
      - run: cargo test -p hitls-crypto --no-default-features --features paillier
      # Auth individual features
      - run: cargo test -p hitls-auth --no-default-features --features otp
      - run: cargo test -p hitls-auth --no-default-features --features spake2plus
      - run: cargo test -p hitls-auth --no-default-features --features privpass
      # T72: Cross-feature combinations
      - run: cargo test -p hitls-tls --no-default-features --features tls12,tls13
      - run: cargo test -p hitls-crypto --no-default-features --features aes,modes,sha2
      - run: cargo test -p hitls-pki --no-default-features --features x509,pkcs8,cms,pkcs12
      # T73: Async protocol feature combinations
      - run: cargo test -p hitls-crypto --no-default-features --features md5
      - run: cargo test -p hitls-tls --no-default-features --features tls12,async
      - run: cargo test -p hitls-tls --no-default-features --features tlcp,async
      - run: cargo test -p hitls-tls --no-default-features --features dtlcp,async

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  miri:
    name: Miri (UB detection)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test -p hitls-bignum
      - run: cargo miri test -p hitls-utils -- --skip prop_
      - run: cargo miri test -p hitls-crypto --all-features -- mceliece::benes
      - run: cargo miri test -p hitls-crypto --all-features -- mlkem::ntt::tests --skip neon
      - run: cargo miri test -p hitls-crypto --all-features -- mldsa::ntt::tests --skip neon
      - run: cargo miri test -p hitls-crypto --all-features -- modes::gcm
      # SHA-2 software path (skip HW cross-validation tests using SIMD)
      - run: cargo miri test -p hitls-crypto --all-features -- sha2::tests --skip compress_soft_vs_dispatch --skip multi_block_consistency
      # SHA-3 software path (HW tests are cfg-gated on aarch64, auto-skipped)
      - run: cargo miri test -p hitls-crypto --all-features -- sha3::tests
      # ChaCha20 software path (skip HW cross-validation tests using SIMD)
      - run: cargo miri test -p hitls-crypto --all-features -- chacha20::tests --skip soft_vs_dispatch_stress --skip keystream_256_bytes_consistency
      # SM3 software path (no SIMD)
      - run: cargo miri test -p hitls-crypto --all-features -- sm3::tests
      # SM4 software path (T-table, no intrinsics)
      - run: cargo miri test -p hitls-crypto --all-features -- sm4::tests
      # P-256/P-384/P-521 specialized Montgomery field arithmetic (unsafe code)
      - run: cargo miri test -p hitls-crypto --all-features -- ecc::p256_field::tests
      - run: cargo miri test -p hitls-crypto --all-features -- ecc::p384_field::tests
      - run: cargo miri test -p hitls-crypto --all-features -- ecc::p521_field::tests

  fuzz-check:
    name: Fuzz Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fuzz
      - run: cargo install cargo-fuzz --locked || true
      - run: cd fuzz && cargo check

  fuzz-smoke:
    name: Fuzz Smoke Test
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || true
      - name: Run fuzz targets (10s each)
        run: |
          cd fuzz
          for target in $(cargo fuzz list); do
            echo "=== Smoke-testing $target ==="
            timeout 30 cargo fuzz run "$target" -- -max_total_time=10 || true
          done

  coverage:
    name: Code Coverage
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: |
          mkdir -p coverage
          cargo +nightly llvm-cov --workspace --all-features --branch --codecov --output-path coverage/codecov.json --ignore-filename-regex "tests/vectors/"
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/codecov.json
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: Supply Chain Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  cross-check:
    name: Cross-compile Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-unknown-linux-gnu, i686-unknown-linux-gnu, s390x-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --target ${{ matrix.target }}

  doc:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  ignored-tests:
    name: Slow & Ignored Tests
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Slow keygen + zeroize verification (skip timing and flaky tests)
      # Skip test_elgamal_generate: flaky safe-prime generation (BnRandGenFail)
      # Skip constant_time: timing tests require --release and quiet hardware
      - run: cargo test -p hitls-crypto --all-features -- --ignored --skip test_openssl --skip test_s_client --skip test_elgamal_generate --skip constant_time

  bench:
    name: Benchmark Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --all-features --no-run

  fuzz-run:
    name: Scheduled Fuzzing
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets (60s each)
        run: |
          cd fuzz
          for target in $(cargo fuzz list); do
            echo "=== Fuzzing $target ==="
            cargo fuzz run "$target" -- -max_total_time=60 -jobs=2 || true
          done
      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore
