name: Kani Formal Verification

on:
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 04:00 UTC
  workflow_dispatch:

jobs:
  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        crate: [hitls-bignum, hitls-utils]
    steps:
      - uses: actions/checkout@v6
      - name: Install Kani
        uses: model-checking/kani-github-action@v1
        with:
          enable-propproof: false
          args: -p ${{ matrix.crate }} --harness kani_proof
