name: tlsfuzzer

# Optional, opt-in protocol-conformance harness. Drives the openhitls-rs
# `s-server` against a curated subset of tlsfuzzer scripts (all TLS 1.3).
#
# - workflow_dispatch: run on demand from the Actions tab.
# - schedule: weekly run so regressions surface even if nobody triggers it.
#
# We deliberately keep this OUT of the required PR check set:
#   * tlsfuzzer + tlslite-ng evolve quickly and are pinned by `git+`,
#     so they can break unrelated PRs.
#   * the harness exercises edge-case mutations that legitimately probe
#     spec ambiguities — surfacing those is valuable but should not
#     gate merges.
# Each script is run with `continue-on-error: true` and the per-script
# logs are uploaded as an artifact so reviewers can triage failures
# without re-running locally.
#
# Setup story for humans wanting to reproduce a failure: see
# docs/tlsfuzzer.md.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly  — Monday 06:00 UTC (sampled run)
    - cron: '0 7 1 * *'  # Monthly — 1st 07:00 UTC (full `-n 9999` sweep)

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  HITLS_PORT: 4444
  HITLS_PORT_12: 4445
  HITLS_PORT_ECDSA: 4446
  HITLS_PORT_ED25519: 4447
  # Phase T98 — optional-mTLS s-server (verify-only, no require).
  # tlsfuzzer mTLS scripts deliberately exercise both the present-cert
  # and the empty-cert paths within a single run, so we cannot use
  # `--require-client-cert` here without breaking sanity steps.
  HITLS_PORT_MTLS: 4448
  # Phase T107 — PSS-OID server instance for `test-tls13-rsapss-
  # signatures.py`. Uses an RSA-PSS cert (`id-RSASSA-PSS` SPKI OID)
  # which makes the server advertise `rsa_pss_pss_*` instead of
  # `rsa_pss_rsae_*` for CertificateVerify (RFC 5756 /
  # RFC 8446 §4.2.3).
  HITLS_PORT_PSS: 4449
  # Phase T108 — TLS 1.2 mTLS s-server instance (verify-only, no
  # require) for `test-certificate-{request,verify,verify-malformed}.py`.
  # Same `--verify-client-cert` pattern as the TLS 1.3 mTLS port,
  # but bound to `--tls 1.2`.
  HITLS_PORT_MTLS_12: 4450
  # Phase T119 — dedicated TLS 1.3 server for the PSK + session-
  # resumption scripts. Carries both `--psk`/`--psk-identity` (external
  # PSK per RFC 8446 §4.2.11) AND `--ticket-key` (deterministic NST
  # encryption, makes resumption traceable across re-handshakes). Kept
  # separate so the broader curated suite running against the main RSA
  # 1.3 listener doesn't get unexpected NSTs.
  HITLS_PORT_PSK: 4451
  # Phase T123 — ECDSA P-384 / P-521 server-cert instances. The
  # cert-matrix runs `test-tls13-ecdsa-support.py` against each so the
  # secp384r1 / secp521r1 CertificateVerify sign paths are actually
  # exercised end-to-end (P-521 server-cert signing landed in I96).
  HITLS_PORT_ECDSA_P384: 4452
  HITLS_PORT_ECDSA_P521: 4453
  # Phase T122 — dedicated `--key-update` server. The flag makes the
  # server reply with a post-handshake KeyUpdate when the request path
  # contains `/keyupdate`; kept on its own instance so it only affects
  # `test-tls13-keyupdate-from-server.py` and not the shared listener.
  HITLS_PORT_KEYUPDATE: 4454
  # Phase T125 — dedicated `--post-handshake-auth` server. The flag
  # makes the server send a post-handshake CertificateRequest when the
  # request path contains `/secret`; kept on its own instance so it
  # only affects `test-tls13-post-handshake-auth.py`.
  HITLS_PORT_PHA: 4455
  # Phase I128 — dedicated `--cert-compression` server (RFC 8879). The
  # flag makes the server advertise zlib and send a CompressedCertificate
  # when the client offers `compress_certificate`; kept on its own
  # instance so it only affects `test-tls13-certificate-compression.py`.
  HITLS_PORT_CERTCOMP: 4456
  # External PSK identity advertised by the server. The matching value
  # `HITLS_PSK_HEX` is generated at setup time and exported into the
  # job environment.
  HITLS_PSK_IDEN: hitls-test-psk
  HITLS_HOST: 127.0.0.1
  # Phase T124 — pinned to specific upstream commits, NOT `master`.
  # tlsfuzzer / tlslite-ng evolve quickly; an unpinned `master` silently
  # shifts the conversation set under our per-script XFAIL files, making
  # CI signal indistinguishable from upstream drift. Bumping these is a
  # deliberate, reviewed "upstream upgrade" step (re-baseline the XFAIL
  # lists in the same PR). Keep in sync with the `tlsfuzzer-core` job in
  # ci.yml.
  TLSFUZZER_REF: bf7f579dc0e65498cfb21b60e9b152f6bd84a3bf
  TLSLITE_NG_REF: 02d1506badb16473faf50ebc3a413c6d789fe31f

concurrency:
  group: tlsfuzzer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tlsfuzzer:
    name: tlsfuzzer (TLS 1.3 + TLS 1.2)
    runs-on: ubuntu-latest
    # 90 min covers the monthly full `-n 9999` sweep; the weekly sampled
    # run finishes in ~2 min well under this cap.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release hitls CLI
        run: cargo build --release -p hitls-cli

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install tlsfuzzer + tlslite-ng (pinned commits)
        # tlsfuzzer is not on PyPI; tlslite-ng on PyPI lags the
        # SignatureScheme additions tlsfuzzer references, so install
        # both from git — pinned to TLSFUZZER_REF / TLSLITE_NG_REF.
        run: |
          python -m pip install --upgrade pip
          pip install ecdsa
          pip install "git+https://github.com/tlsfuzzer/tlslite-ng@${TLSLITE_NG_REF}"
          # `git clone --branch` only accepts branch/tag names, not
          # commit SHAs — clone then check out the pinned commit.
          git clone https://github.com/tlsfuzzer/tlsfuzzer \
            "${RUNNER_TEMP}/tlsfuzzer"
          git -C "${RUNNER_TEMP}/tlsfuzzer" checkout --quiet "${TLSFUZZER_REF}"

      - name: Generate test certificates (RSA + ECDSA P-256 + Ed25519, all PKCS#8)
        # hitls s-server only loads PKCS#8 PEM keys; the cert matrix
        # is one-per-key-type so tlsfuzzer's per-cert sig-alg
        # expectations can be exercised against the matching server
        # instance. Phase T93.
        run: |
          mkdir -p "${RUNNER_TEMP}/certs"
          # RSA 2048 (default, most tlsfuzzer scripts assume RSA).
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout "${RUNNER_TEMP}/certs/key-rsa.pem" \
            -out    "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            -subj   "/CN=localhost" -days 1
          openssl pkcs8 -topk8 -nocrypt \
            -in  "${RUNNER_TEMP}/certs/key-rsa.pem" \
            -out "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem"
          # ECDSA P-256 (Phase T93).
          openssl ecparam -genkey -name prime256v1 -noout \
            -out "${RUNNER_TEMP}/certs/key-ecdsa-p256.pem"
          openssl req -x509 -new \
            -key "${RUNNER_TEMP}/certs/key-ecdsa-p256.pem" \
            -out "${RUNNER_TEMP}/certs/cert-ecdsa-p256.pem" \
            -subj "/CN=localhost" -days 1
          openssl pkcs8 -topk8 -nocrypt \
            -in  "${RUNNER_TEMP}/certs/key-ecdsa-p256.pem" \
            -out "${RUNNER_TEMP}/certs/key-ecdsa-p256-pkcs8.pem"
          # ECDSA P-384 + P-521 (Phase T123). secp521r1 server-cert
          # signing landed in I96; the cert matrix now exercises all
          # three NIST ECDSA curves.
          for c in "p384:secp384r1" "p521:secp521r1"; do
            name="${c%%:*}"; curve="${c##*:}"
            openssl ecparam -genkey -name "${curve}" -noout \
              -out "${RUNNER_TEMP}/certs/key-ecdsa-${name}.pem"
            openssl req -x509 -new \
              -key "${RUNNER_TEMP}/certs/key-ecdsa-${name}.pem" \
              -out "${RUNNER_TEMP}/certs/cert-ecdsa-${name}.pem" \
              -subj "/CN=localhost" -days 1
            openssl pkcs8 -topk8 -nocrypt \
              -in  "${RUNNER_TEMP}/certs/key-ecdsa-${name}.pem" \
              -out "${RUNNER_TEMP}/certs/key-ecdsa-${name}-pkcs8.pem"
          done
          # Ed25519 (Phase T93).
          openssl genpkey -algorithm Ed25519 \
            -out "${RUNNER_TEMP}/certs/key-ed25519-pkcs8.pem"
          openssl req -x509 -new \
            -key "${RUNNER_TEMP}/certs/key-ed25519-pkcs8.pem" \
            -out "${RUNNER_TEMP}/certs/cert-ed25519.pem" \
            -subj "/CN=localhost" -days 1
          # Phase T98 — mTLS scaffolding: a CA cert that signs a
          # client cert+key. The s-server `--verify-client-cert <CA>`
          # path validates incoming client certs against this CA;
          # tlsfuzzer's `-c`/`-k` then present the matching client
          # identity.
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout "${RUNNER_TEMP}/certs/key-client-ca.pem" \
            -out    "${RUNNER_TEMP}/certs/cert-client-ca.pem" \
            -subj   "/CN=hitls-test-client-ca" -days 1
          openssl req -newkey rsa:2048 -nodes \
            -keyout "${RUNNER_TEMP}/certs/key-client.pem" \
            -out    "${RUNNER_TEMP}/certs/client.csr" \
            -subj   "/CN=hitls-test-client"
          openssl x509 -req -in "${RUNNER_TEMP}/certs/client.csr" \
            -CA  "${RUNNER_TEMP}/certs/cert-client-ca.pem" \
            -CAkey "${RUNNER_TEMP}/certs/key-client-ca.pem" \
            -CAcreateserial \
            -out "${RUNNER_TEMP}/certs/cert-client.pem" -days 1
          openssl pkcs8 -topk8 -nocrypt \
            -in  "${RUNNER_TEMP}/certs/key-client.pem" \
            -out "${RUNNER_TEMP}/certs/key-client-pkcs8.pem"
          # Phase I133 — ECDSA P-256 + Ed25519 client certs (signed by the
          # same client CA) for the EC/EdDSA CertificateVerify cert-matrix
          # scripts. tlsfuzzer signs the CV with the matching client key;
          # the server validates the chain against cert-client-ca.pem and
          # verifies the CV under the cert's EC/EdDSA key.
          openssl ecparam -genkey -name prime256v1 -noout \
            -out "${RUNNER_TEMP}/certs/key-client-ecdsa.pem"
          openssl req -new -key "${RUNNER_TEMP}/certs/key-client-ecdsa.pem" \
            -out "${RUNNER_TEMP}/certs/client-ecdsa.csr" \
            -subj "/CN=hitls-test-client-ecdsa"
          openssl x509 -req -in "${RUNNER_TEMP}/certs/client-ecdsa.csr" \
            -CA  "${RUNNER_TEMP}/certs/cert-client-ca.pem" \
            -CAkey "${RUNNER_TEMP}/certs/key-client-ca.pem" \
            -CAcreateserial \
            -out "${RUNNER_TEMP}/certs/cert-client-ecdsa.pem" -days 1
          openssl genpkey -algorithm Ed25519 \
            -out "${RUNNER_TEMP}/certs/key-client-ed25519.pem"
          openssl req -new -key "${RUNNER_TEMP}/certs/key-client-ed25519.pem" \
            -out "${RUNNER_TEMP}/certs/client-ed25519.csr" \
            -subj "/CN=hitls-test-client-ed25519"
          openssl x509 -req -in "${RUNNER_TEMP}/certs/client-ed25519.csr" \
            -CA  "${RUNNER_TEMP}/certs/cert-client-ca.pem" \
            -CAkey "${RUNNER_TEMP}/certs/key-client-ca.pem" \
            -CAcreateserial \
            -out "${RUNNER_TEMP}/certs/cert-client-ed25519.pem" -days 1
          # Phase T107 — RSA-PSS (`id-RSASSA-PSS` SPKI OID) cert + key.
          # Tlsfuzzer `test-tls13-rsapss-signatures.py` hardcodes
          # PSS-OID server-cert expectations. openssl emits the PSS
          # alg-id in both the SPKI and signature_algorithm slots
          # when generated via `genpkey -algorithm RSA-PSS`.
          openssl genpkey -algorithm RSA-PSS \
            -pkeyopt rsa_keygen_bits:2048 \
            -pkeyopt rsa_pss_keygen_md:sha256 \
            -pkeyopt rsa_pss_keygen_mgf1_md:sha256 \
            -pkeyopt rsa_pss_keygen_saltlen:32 \
            -out "${RUNNER_TEMP}/certs/key-pss.pem"
          openssl req -x509 -new \
            -key "${RUNNER_TEMP}/certs/key-pss.pem" \
            -out "${RUNNER_TEMP}/certs/cert-pss.pem" \
            -subj "/CN=localhost" -days 1
          openssl pkcs8 -topk8 -nocrypt \
            -in  "${RUNNER_TEMP}/certs/key-pss.pem" \
            -out "${RUNNER_TEMP}/certs/key-pss-pkcs8.pem"

      - name: Start hitls s-server instances (10 ports — RSA/ECDSA/Ed25519/mTLS/PSS/PSK)
        run: |
          # RSA TLS 1.3 — main instance, used by most tlsfuzzer
          # scripts (which default to RSA-PSS sig algs).
          ./target/release/hitls s-server \
            -p "${HITLS_PORT}" \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-rsa-1.3.log" 2>&1 &
          echo "SERVER_PID_RSA=$!" >> "$GITHUB_ENV"
          # RSA TLS 1.2 — Phase T90.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_12}" --tls 1.2 \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-rsa-1.2.log" 2>&1 &
          echo "SERVER_PID_RSA_12=$!" >> "$GITHUB_ENV"
          # ECDSA P-256 TLS 1.3 — Phase T93. Used by the
          # ECDSA-specific cert-matrix script subset.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_ECDSA}" \
            --cert "${RUNNER_TEMP}/certs/cert-ecdsa-p256.pem" \
            --key  "${RUNNER_TEMP}/certs/key-ecdsa-p256-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-ecdsa-1.3.log" 2>&1 &
          echo "SERVER_PID_ECDSA=$!" >> "$GITHUB_ENV"
          # Ed25519 TLS 1.3 — Phase T93.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_ED25519}" \
            --cert "${RUNNER_TEMP}/certs/cert-ed25519.pem" \
            --key  "${RUNNER_TEMP}/certs/key-ed25519-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-ed25519-1.3.log" 2>&1 &
          echo "SERVER_PID_ED25519=$!" >> "$GITHUB_ENV"
          # mTLS RSA TLS 1.3 — Phase T98. `--verify-client-cert`
          # makes client auth optional (request CR but accept empty),
          # which is what tlsfuzzer's first sanity step needs before
          # it switches to presenting a real cert.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_MTLS}" \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            --verify-client-cert "${RUNNER_TEMP}/certs/cert-client-ca.pem" \
            -q > "${RUNNER_TEMP}/server-mtls-1.3.log" 2>&1 &
          echo "SERVER_PID_MTLS=$!" >> "$GITHUB_ENV"
          # PSS-OID TLS 1.3 — Phase T107. The PKCS#8 key is encoded
          # with the `id-RSASSA-PSS` OID (1.2.840.113549.1.1.10) which
          # makes our s-server advertise `rsa_pss_pss_*` instead of
          # `rsa_pss_rsae_*` in CertificateVerify (RFC 5756 /
          # RFC 8446 §4.2.3). Required for `test-tls13-rsapss-
          # signatures.py` which hardcodes PSS-OID server expectations.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_PSS}" \
            --cert "${RUNNER_TEMP}/certs/cert-pss.pem" \
            --key  "${RUNNER_TEMP}/certs/key-pss-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-pss-1.3.log" 2>&1 &
          echo "SERVER_PID_PSS=$!" >> "$GITHUB_ENV"
          # Phase T108 — TLS 1.2 mTLS server. Same `--verify-client-cert`
          # plumbing as the TLS 1.3 mTLS port but locked to TLS 1.2.
          # tlsfuzzer's `test-certificate-{request,verify,verify-
          # malformed}.py` run against this instance.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_MTLS_12}" --tls 1.2 \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            --verify-client-cert "${RUNNER_TEMP}/certs/cert-client-ca.pem" \
            -q > "${RUNNER_TEMP}/server-mtls-1.2.log" 2>&1 &
          echo "SERVER_PID_MTLS_12=$!" >> "$GITHUB_ENV"
          # Phase T119 — PSK + session-resumption server. Carries both
          # an external PSK (`--psk` + `--psk-identity`, RFC 8446
          # §4.2.11 external PSK auth) AND a deterministic 32-byte
          # ticket key (`--ticket-key`, enables resumption via NST).
          # PSK material is generated here and exported to subsequent
          # steps so the tlsfuzzer scripts can re-use it.
          PSK_HEX=$(openssl rand -hex 32)
          echo "HITLS_PSK_HEX=${PSK_HEX}" >> "$GITHUB_ENV"
          TICKET_KEY_HEX=$(openssl rand -hex 32)
          # Phase I111 — `--tls auto` lets this listener accept both
          # TLS 1.2 and TLS 1.3 ClientHellos. Required by
          # `test-tls13-session-resumption.py`'s `sanity - TLS 1.2`
          # and `use TLS 1.2 ticket in TLS 1.3` conversations, which
          # exercise the cross-version corner: a TLS 1.2 RFC 5077
          # ticket flow on the same port that handles TLS 1.3
          # resumption. PSK + ticket-key options apply equally to
          # both negotiated versions (TLS 1.2 NST is a separate
          # RFC 5077 ticket; TLS 1.3 NST is the §4.6.1 NewSessionTicket
          # message). Args file pairs with this via `-d` so the
          # script negotiates ECDHE rather than its default static-
          # RSA cipher list (we don't offer static-RSA suites).
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_PSK}" --tls auto \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            --psk "${PSK_HEX}" \
            --psk-identity "${HITLS_PSK_IDEN}" \
            --ticket-key "${TICKET_KEY_HEX}" \
            -q > "${RUNNER_TEMP}/server-psk-1.3.log" 2>&1 &
          echo "SERVER_PID_PSK=$!" >> "$GITHUB_ENV"
          # ECDSA P-384 + P-521 TLS 1.3 — Phase T123. Each runs
          # `test-tls13-ecdsa-support.py` so the secp384r1 / secp521r1
          # CertificateVerify sign paths are exercised against the
          # matching server cert (P-521 server-cert signing landed
          # in I96; before that a P-521 cert aborted the handshake).
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_ECDSA_P384}" \
            --cert "${RUNNER_TEMP}/certs/cert-ecdsa-p384.pem" \
            --key  "${RUNNER_TEMP}/certs/key-ecdsa-p384-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-ecdsa-p384-1.3.log" 2>&1 &
          echo "SERVER_PID_ECDSA_P384=$!" >> "$GITHUB_ENV"
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_ECDSA_P521}" \
            --cert "${RUNNER_TEMP}/certs/cert-ecdsa-p521.pem" \
            --key  "${RUNNER_TEMP}/certs/key-ecdsa-p521-pkcs8.pem" \
            -q > "${RUNNER_TEMP}/server-ecdsa-p521-1.3.log" 2>&1 &
          echo "SERVER_PID_ECDSA_P521=$!" >> "$GITHUB_ENV"
          # Phase T122 — `--key-update` instance. tlsfuzzer's
          # `test-tls13-keyupdate-from-server.py` drives it: a request
          # whose path contains `/keyupdate` triggers a server-initiated
          # post-handshake KeyUpdate (`update_requested`).
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_KEYUPDATE}" \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            --key-update \
            -q > "${RUNNER_TEMP}/server-keyupdate-1.3.log" 2>&1 &
          echo "SERVER_PID_KEYUPDATE=$!" >> "$GITHUB_ENV"
          # Phase T125 — `--post-handshake-auth` instance. tlsfuzzer's
          # `test-tls13-post-handshake-auth.py` drives it: a request
          # whose path contains `/secret` triggers a post-handshake
          # CertificateRequest (RFC 8446 §4.6.2).
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_PHA}" \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            --post-handshake-auth \
            -q > "${RUNNER_TEMP}/server-pha-1.3.log" 2>&1 &
          echo "SERVER_PID_PHA=$!" >> "$GITHUB_ENV"
          # Phase I128 — `--cert-compression` instance (RFC 8879). Advertises
          # zlib so the server sends a CompressedCertificate when the client
          # offers `compress_certificate`; isolated so it only affects
          # `test-tls13-certificate-compression.py`.
          ./target/release/hitls s-server \
            -p "${HITLS_PORT_CERTCOMP}" \
            --cert "${RUNNER_TEMP}/certs/cert-rsa.pem" \
            --key  "${RUNNER_TEMP}/certs/key-rsa-pkcs8.pem" \
            --cert-compression \
            -q > "${RUNNER_TEMP}/server-certcomp-1.3.log" 2>&1 &
          echo "SERVER_PID_CERTCOMP=$!" >> "$GITHUB_ENV"
          # Wait for all 13 listeners.
          for port in "${HITLS_PORT}" "${HITLS_PORT_12}" \
                      "${HITLS_PORT_ECDSA}" "${HITLS_PORT_ED25519}" \
                      "${HITLS_PORT_MTLS}" "${HITLS_PORT_PSS}" \
                      "${HITLS_PORT_MTLS_12}" "${HITLS_PORT_PSK}" \
                      "${HITLS_PORT_ECDSA_P384}" "${HITLS_PORT_ECDSA_P521}" \
                      "${HITLS_PORT_KEYUPDATE}" "${HITLS_PORT_PHA}" \
                      "${HITLS_PORT_CERTCOMP}"; do
            for _ in $(seq 1 30); do
              if ss -ltn "( sport = :${port} )" | grep -q ":${port}"; then
                echo "server on port ${port} up"
                break
              fi
              sleep 0.5
            done
          done

      - name: Run curated tlsfuzzer TLS 1.3 scripts
        # Phase T89 — runs each script via `tests/tlsfuzzer/run.sh`,
        # which attaches the per-script XFAIL list at
        # `tests/tlsfuzzer/xfail/*.txt` so tlsfuzzer's own exit code
        # tells us "no NEW regressions and no XPASS". A failure here
        # means either:
        #   - a known-bad conversation now PASSes (XPASS) → drop it
        #     from the xfail list, or
        #   - a previously-PASSing conversation now FAILs (regression)
        #     → bisect or add to xfail with a written reason.
        env:
          # Hoist the only `${{ }}` expression out of this (very large) run
          # block. GitHub template-processes a `run` block as a SINGLE
          # expression whenever it contains any `${{ }}`; with the curated
          # script arrays this block exceeds the 21000-char expression limit,
          # which made the entire workflow fail to parse (workflow_dispatch →
          # HTTP 422 "Exceeded max expression length 21000"; push → 0 s
          # validation failure; the weekly/monthly schedules never fired).
          # Referencing the env var below keeps the run block a pure literal.
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set +e
          mkdir -p "${RUNNER_TEMP}/tlsfuzzer-logs"
          export TLSFUZZER_DIR="${RUNNER_TEMP}/tlsfuzzer"
          export TLSFUZZER_PY=python
          # Phase T124 — the monthly cron does a full `-n 9999` sweep
          # so conversations that per-script sampling would skip still
          # get exercised; the weekly cron + manual dispatch stay
          # sampled. run.sh reads SWEEP_N and appends `-n` when set.
          if [ "${SCHEDULE}" = "0 7 1 * *" ]; then
            export SWEEP_N=9999
            echo "monthly full sweep enabled (SWEEP_N=9999)"
          fi
          scripts=(
            # T88/T89 baseline (6)
            test-tls13-conversation.py
            test-tls13-ccs.py
            test-tls13-multiple-ccs-messages.py
            test-tls13-finished.py
            test-tls13-keyshare-omitted.py
            test-tls13-version-negotiation.py
            # T92 additions (11) — broader protocol surface:
            # HRR / record padding & limits / KeyUpdate / signature
            # algorithms / cipher availability / connection abort.
            test-tls13-record-padding.py
            test-tls13-lengths.py
            test-tls13-nociphers.py
            test-tls13-no-unknown-groups.py
            test-tls13-connection-abort.py
            test-tls13-record-layer-limits.py
            test-tls13-rsa-signatures.py
            test-tls13-hrr.py
            test-tls13-eddsa.py
            test-tls13-finished-plaintext.py
            # T94 additions (2):
            # NewSessionTicket emission count + 0-RTT-garbage edge
            # cases (the 0-RTT-accepting paths themselves are XFAIL'd
            # — `s-server` doesn't have a `--max-early-data-size`
            # flag yet, so we can only exercise the no-early-data
            # branch here).
            test-tls13-count-tickets.py
            test-tls13-0rtt-garbage.py
            # T100 additions (2): T100's wire-alert mapping fix
            # ("too short" / "invalid length" → decode_error;
            # KeyUpdate "invalid request_update" → illegal_parameter)
            # closed 92 + 254 conversations across these two scripts
            # without any crypto-layer change. Stable XFAIL lists
            # cover the residual 13 + 9 conversations (cross-record
            # handshake fragmentation + extension-tolerance gaps).
            test-tls13-signature-algorithms.py
            test-tls13-keyupdate.py
            # T103 additions (2): empty-Alert rejection at the
            # record layer (RFC 8446 §5.1) + zero-length AppData
            # transparent pass-through. empty-alert is fully clean
            # (10/10 PASS); zero-length-data has 6 stable XFAILs
            # split across CH-fragmentation + s_server echo-loop
            # behaviour (see xfail/test-tls13-zero-length-data.txt
            # for the per-entry rationale).
            test-tls13-empty-alert.py
            test-tls13-zero-length-data.py
            # T105 addition (1): AES-CCM TLS 1.3 cipher suites
            # (`TLS_AES_128_CCM_SHA256` + `TLS_AES_128_CCM_8_SHA256`)
            # are now in the server default cipher list and
            # `CipherSuiteParams::from_suite` recognises CCM-16. The
            # crypto layer + AEAD plumbing had supported them since
            # project start; only the negotiation entry was missing.
            # Closes 386 conversations (1159/1159 PASS clean).
            test-tls13-symetric-ciphers.py
            # T126 addition (1): zero-content-type record rejection.
            # T126 fixed `tls_error_to_alert` to map the record-layer
            # "inner plaintext has no content type" fault to
            # `unexpected_message` (RFC 8446 §5.1/§5.2) instead of
            # `internal_error` — 2/8 → 6/8; the 2 residual XFAILs are
            # app-data-phase cases (see xfail/test-tls13-zero-content-
            # type.txt).
            test-tls13-zero-content-type.py
            # I119 addition (1): RFC 8446 §6.2 close-on-received-alert.
            # The server now closes WITHOUT a responding alert when the
            # client aborts mid-handshake with an alert (encrypted or
            # plaintext) instead of sending its Finished — previously it
            # replied `unexpected_message`. 2/2-fail → 4/4 PASS clean.
            test-tls13-unencrypted-alert.py
            # T127 addition (1): (EC)DHE shared-secret padding across
            # curves. 513 PASS — incl. all secp256r1/384r1/521r1 (P-384/
            # P-521 ECDHE wired in I99); 3 XFAILs (ffdhe2048/3072 pending
            # the FFDHE phase, x448 not in the default supported_groups —
            # see xfail/test-tls13-dhe-shared-secret-padding.txt).
            test-tls13-dhe-shared-secret-padding.py
            # T132 coverage-expansion batch (3) — clean-PASS TLS 1.3
            # conformance scripts surfaced by a local triage sweep of
            # the uncurated tlsfuzzer corpus. Each runs against the
            # shared RSA TLS 1.3 listener with no extra args and 0
            # XFAIL (verified locally against the release s-server,
            # stable across repeated + back-to-back runs):
            #   * unrecognised-groups   32/32  — unknown supported_groups
            #     entries are correctly ignored (RFC 8446 §4.2.7).
            #   * serverhello-random   256/0   — ServerHello.random
            #     carries no TLS 1.2/1.1 downgrade sentinel and is
            #     well-distributed across repeated handshakes.
            #   * invalid-ciphers       52/52  — malformed / unknown
            #     cipher-suite list entries rejected or ignored per spec.
            # (test-tls13-large-number-of-extensions.py was triaged but
            # NOT curated: 22/22 standalone yet 20/2 under back-to-back
            # contention — 2 large multi-record ClientHellos, ext ids up
            # to 4119, intermittently draw handshake_failure / decode_error.
            # Flagged for a separate large-CH-reassembly robustness probe.)
            test-tls13-unrecognised-groups.py
            test-tls13-serverhello-random.py
            test-tls13-invalid-ciphers.py
            # T133 coverage-expansion batch 2 (2 TLS 1.3) — clean-PASS,
            # no extra args, 0 XFAIL (verified stable on a fresh
            # release s-server):
            #   * tls13-ffdhe-sanity   7/7  — basic FFDHE (ffdhe2048/3072)
            #     key-exchange sanity in TLS 1.3 negotiates cleanly.
            #   * tls13-pkcs-signature 8/8  — rsa_pkcs1_* sig schemes are
            #     refused for CertificateVerify in TLS 1.3 (RFC 8446
            #     §4.2.3) yet accepted in the legacy-compat spots the
            #     script probes.
            test-tls13-ffdhe-sanity.py
            test-tls13-pkcs-signature.py
            # I124 curve-family batch (3) — unblocked by the malformed
            # key_share → illegal_parameter fix (RFC 8446 §4.2.8.2):
            #   * crfg-curves   18/0  — malformed X25519/X448 key shares
            #     now rejected with illegal_parameter (was internal_error).
            #   * ecdhe-curves  33/0  — malformed P-256/384/521 key shares
            #     (point at infinity / off-curve / wrong length) ditto.
            #   * ffdhe-groups  62/0  — malformed FFDHE key-share *values*
            #     (I124) plus the framing-validation gap (right-truncated /
            #     wrong-group-sized / duplicated entries) now both rejected
            #     with illegal_parameter at parse time; 0 XFAIL.
            test-tls13-crfg-curves.py
            test-tls13-ecdhe-curves.py
            test-tls13-ffdhe-groups.py
            # I130 — obsolete-curves 117/54. Run with `--relaxed` (args/) to
            # match RFC 8446 §4.2.7 ignore-unrecognized; the §4.2.8 key_share
            # ⊄ supported_groups → illegal_parameter check closes the 27
            # "inconsistent extensions" cases. The 54 XFAILs are all the
            # no-common-group → handshake_failure (§4.1.1) vs illegal_parameter
            # alert-convention difference (see xfail/).
            test-tls13-obsolete-curves.py
          )
          # TLS 1.2 scripts (Phase T90) run against the 1.2 listener
          # on $HITLS_PORT_12. Per-script extra args (`-C 49199` cipher
          # selection, or `-d` to negotiate ECDHE) live in
          # tests/tlsfuzzer/args/<script>.txt and are auto-applied by
          # run.sh — nothing special needed here.
          #
          # Phase T128 added the last 5 (aes-gcm-nonces …
          # ecdhe-rsa-key-exchange): the TLS 1.2 server-conformance
          # fix in I101 (signature_algorithms-absent default +
          # ec_point_formats echo) unblocked their sanity handshakes.
          scripts_12=(
            test-conversation.py
            test-invalid-content-type.py
            test-connection-abort.py
            test-fuzzed-ciphertext.py
            test-ccs.py
            test-cve-2016-2107.py
            test-cve-2016-6309.py
            test-ecdhe-rsa-key-exchange-with-bad-messages.py
            test-invalid-compression-methods.py
            test-aes-gcm-nonces.py
            test-encrypt-then-mac.py
            test-version-numbers.py
            test-zero-length-data.py
            test-ecdhe-rsa-key-exchange.py
            test-ffdhe-negotiation.py
            test-ffdhe-expected-params.py
            # T133 coverage-expansion batch 2 (2 TLS 1.2) — clean-PASS,
            # no extra args, 0 XFAIL (verified on a fresh release
            # s-server `--tls 1.2`):
            #   * cve-2004-0079      4/4  — CVE-2004-0079 (SSL/TLS NULL
            #     deref via crafted handshake) regression: handled safely.
            #   * no-mlkem-in-old-tls 12/12 — ML-KEM key-share / named
            #     groups are correctly rejected/ignored in TLS 1.2 (they
            #     are TLS-1.3-only); guards against a hybrid-PQC group
            #     leaking into a 1.2 handshake.
            test-cve-2004-0079.py
            test-no-mlkem-in-old-tls.py
            # T134 small-XFAIL batch (3) — mostly-PASS TLS 1.2 scripts
            # curated with documented per-entry XFAIL lists (see
            # tests/tlsfuzzer/xfail/<script>.txt for rationale):
            #   * signature-algorithms 275/1 — 1 XFAIL: SHA-1-only
            #     sig_algs refused (deprecated; won't fix).
            #   * x25519                20/4 — 2 ECDHE→DHE cross-kx
            #     fallback (I105 gap) + 2 malformed-keyshare strictness.
            #   * point-extension        7/2 — malformed/absent
            #     ec_point_formats leniency (strictness follow-up).
            test-signature-algorithms.py
            test-x25519.py
            test-point-extension.py
            # I120 addition (1): TLS 1.2 RSA-PSS-rsae SHA-384/512 SKE
            # signing. 15/3 — the 3 XFAILs are `rsa_pss_pss_*-only`
            # (cert-type mismatch: needs the PSS-OID cert on :4449,
            # not this rsae cert). See xfail/test-sig-algs.txt.
            test-sig-algs.py
            # T135 cipher-args batch (1): EMS. `-d` (args/) negotiates
            # ECDHE; 9/9 — the 9 XFAILs are unsupported features
            # (TLS 1.1, renegotiation, TLS 1.2 session resumption) +
            # 1 malformed-ext strictness. See xfail/.
            test-extended-master-secret-extension.py
            # T138 TLS 1.2 robustness batch — clean-PASS, `-d` (args/)
            # negotiates ECDHE (these scripts default to static-RSA kx,
            # which we don't offer), 0 XFAIL. Lock in correct handling of
            # malformed/oversized input + heartbeat-absence:
            #   * fuzzed-MAC              32/0 — record MAC mutations → bad_record_mac
            #   * fuzzed-padding          13/0 — CBC padding mutations
            #   * large-hello             52/0 — oversized ClientHello variants
            #   * no-heartbeat             7/0 — heartbeat ext absent / rejected (RFC 6520 not offered)
            #   * hello-request-by-client  3/0 — client-sent HelloRequest handled
            test-fuzzed-MAC.py
            test-fuzzed-padding.py
            test-large-hello.py
            test-no-heartbeat.py
            test-hello-request-by-client.py
            # I135 TLS 1.2 record/handshake conformance batch (`-d` via args/):
            #   * record-layer-fragmentation 22/2 — cross-record handshake
            #     reassembly (RFC 5246 §6.2.1); 2 XFAIL = echo-server 1-byte
            #     app-data quirk, not a protocol bug (see xfail/).
            #   * message-skipping           11/0 — out-of-sequence handshake
            #     messages now draw unexpected_message (RFC 5246 §7.2.2),
            #     not handshake_failure.
            #   * atypical-padding           12/0 — TLS 1.2 TLSCiphertext limit
            #     is 2^14+2048 (RFC 5246 §6.2.1), not the 1.3 +256: a legal
            #     2^14-plaintext CBC record with large padding no longer
            #     draws record_overflow.
            test-record-layer-fragmentation.py
            test-message-skipping.py
            test-atypical-padding.py
          )
          # Phase T93 — cert-matrix scripts. Each cert type gets its
          # own XFAIL list under `tests/tlsfuzzer/xfail-<key-type>/`
          # because tlsfuzzer's per-conversation pass/fail outcome
          # depends on whether the server cert can satisfy the
          # script's hard-coded `signature_algorithms` constraint.
          scripts_ecdsa=(
            test-tls13-conversation.py
            test-tls13-ecdsa-support.py
          )
          # Phase T123 — P-384 / P-521 cert subsets. Only
          # `test-tls13-ecdsa-support.py` (NOT conversation.py): the
          # latter's default `signature_algorithms` advertises only
          # `ecdsa_secp256r1_sha256` among ECDSA schemes, so it can't
          # satisfy a P-384/P-521 server cert and would fail every
          # `sanity` conversation. `ecdsa-support.py` advertises each
          # curve explicitly and carries its own sanity steps.
          scripts_ecdsa_p384=(
            test-tls13-ecdsa-support.py
          )
          scripts_ecdsa_p521=(
            test-tls13-ecdsa-support.py
          )
          # Phase T122 — server-initiated KeyUpdate. Runs against the
          # dedicated `--key-update` instance; previously this script
          # lived in the main `scripts` array with 1 XFAIL because the
          # shared listener had no server-KeyUpdate trigger.
          scripts_keyupdate=(
            test-tls13-keyupdate-from-server.py
          )
          # Phase T125 — post-handshake client auth. Runs against the
          # dedicated `--post-handshake-auth` instance; passes the
          # client identity (`-k`/`-c`) like the mTLS subsets.
          # `--pha-as-reply` lives in tests/tlsfuzzer/args/.
          scripts_pha=(
            test-tls13-post-handshake-auth.py
          )
          scripts_ed25519=(
            test-tls13-conversation.py
            test-tls13-eddsa.py
          )
          # Phase T98/T99 — mTLS scripts. We pass the client identity
          # (`-k`/`-c`) on the command line because RUNNER_TEMP isn't
          # known when args/<script>.txt is written.
          #
          # T99 closed the random fuzzed-signature names problem on
          # `test-tls13-certificate-verify.py` by mapping CV signature-
          # verify failures to `decrypt_error` (RFC 8446 §6.2). With
          # the right alert all of those random conversations now PASS
          # without needing per-name XFAILs — only `check sigalgs in
          # cert request` remains and is XFAIL'd.
          scripts_mtls=(
            test-tls13-certificate-request.py
            test-tls13-certificate-verify.py
          )
          # Phase T107 — PSS-OID server cert scripts. `test-tls13-
          # rsapss-signatures.py` hardcodes `rsa_pss_pss_*` server-
          # cert expectations; our PSS-OID s-server instance on
          # port 4449 satisfies them. 0/8 PASS pre-T107 → 8/8 PASS.
          scripts_pss=(
            test-tls13-rsapss-signatures.py
          )
          # Phase T108 — TLS 1.2 mTLS scripts. Same `-k`/`-c` client-
          # identity plumbing as the TLS 1.3 mTLS set, run against
          # the `--tls 1.2 --verify-client-cert` server on
          # `${HITLS_PORT_MTLS_12}`. Per-script `-C 49199` is needed
          # for tlsfuzzer's default ECDHE-RSA-AES-128-GCM cipher
          # choice (already plumbed via tests/tlsfuzzer/args/*.txt).
          # All four scripts are PASS-dominant: aggregate
          # 1276 PASS / 3 XFAIL / 0 FAIL post-T110.
          # T110 addition: test-certificate-malformed.py (1000/2 XFAIL)
          # after the strict-body-length + empty-cert-entry checks
          # in `decode_certificate12` and the same body-length tighten
          # in `decode_certificate_verify12` (also cleared the last 1
          # FAIL in test-certificate-verify-malformed.py).
          scripts_mtls_12=(
            test-certificate-request.py
            test-certificate-verify.py
            test-certificate-verify-malformed.py
            test-certificate-malformed.py
          )
          # Phase T119 — PSK + session-resumption scripts. Run against
          # the dedicated `--psk`/`--ticket-key` instance on
          # `${HITLS_PORT_PSK}`. `test-tls13-psk_dhe_ke.py` needs the
          # PSK material on its own command line (the script-side
          # `--psk` / `--psk-iden` flags), passed dynamically below.
          # `test-tls13-session-resumption.py` only depends on the
          # server's `--ticket-key` and takes no script-side PSK args.
          scripts_psk=(
            test-tls13-psk_dhe_ke.py
            test-tls13-session-resumption.py
          )
          # Phase I128 — RFC 8879 certificate compression. Run against the
          # dedicated `--cert-compression` instance on ${HITLS_PORT_CERTCOMP}.
          # 28/1: the single XFAIL ("sending extension in TLS-1.2") sends a
          # TLS-1.2 ClientHello that this TLS-1.3 listener rejects by design.
          scripts_certcomp=(
            test-tls13-certificate-compression.py
          )
          aggregate_exit=0
          : > "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
          # Phase T92 — drop the explicit `-n 9999` from the loop and
          # let each script's own default sub-sampling apply. `-n 9999`
          # is still the right flag for one-time XFAIL-list enumeration
          # locally (`tests/tlsfuzzer/run.sh ... -n 9999`); for routine
          # CI gating, sampling is fine — XFAIL accounting works
          # whether or not a specific conversation is sampled in a
          # given run, and dropping `-n 9999` cuts wall-clock from
          # ~12 min to ~3 min on the TLS 1.3 leg (test-tls13-lengths.py
          # alone goes from 6 min to 38 s).
          for s in "${scripts[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}.log"
            echo "=== TLS 1.3: $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (TLS 1.3) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          for s in "${scripts_12[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-1.2.log"
            echo "=== TLS 1.2: $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_12}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (TLS 1.2) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T93 — ECDSA cert-matrix.
          for s in "${scripts_ecdsa[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-ecdsa.log"
            echo "=== TLS 1.3 (ECDSA cert): $s ==="
            XFAIL_DIR="${GITHUB_WORKSPACE}/tests/tlsfuzzer/xfail-ecdsa" \
              ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_ECDSA}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (ECDSA cert) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T123 — ECDSA P-384 cert-matrix.
          for s in "${scripts_ecdsa_p384[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-ecdsa-p384.log"
            echo "=== TLS 1.3 (ECDSA P-384 cert): $s ==="
            XFAIL_DIR="${GITHUB_WORKSPACE}/tests/tlsfuzzer/xfail-ecdsa-p384" \
              ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_ECDSA_P384}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (ECDSA P-384 cert) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T123 — ECDSA P-521 cert-matrix.
          for s in "${scripts_ecdsa_p521[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-ecdsa-p521.log"
            echo "=== TLS 1.3 (ECDSA P-521 cert): $s ==="
            XFAIL_DIR="${GITHUB_WORKSPACE}/tests/tlsfuzzer/xfail-ecdsa-p521" \
              ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_ECDSA_P521}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (ECDSA P-521 cert) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T122 — server-initiated KeyUpdate subset.
          for s in "${scripts_keyupdate[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}.log"
            echo "=== TLS 1.3 (--key-update): $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_KEYUPDATE}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (--key-update) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T125 — post-handshake client auth subset.
          for s in "${scripts_pha[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}.log"
            echo "=== TLS 1.3 (--post-handshake-auth): $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_PHA}" \
              -k "${RUNNER_TEMP}/certs/key-client-pkcs8.pem" \
              -c "${RUNNER_TEMP}/certs/cert-client.pem" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (--post-handshake-auth) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T93 — Ed25519 cert-matrix.
          for s in "${scripts_ed25519[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-ed25519.log"
            echo "=== TLS 1.3 (Ed25519 cert): $s ==="
            XFAIL_DIR="${GITHUB_WORKSPACE}/tests/tlsfuzzer/xfail-ed25519" \
              ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_ED25519}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (Ed25519 cert) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T98 — mTLS subset.
          for s in "${scripts_mtls[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-mtls.log"
            echo "=== TLS 1.3 (mTLS): $s ==="
            XFAIL_DIR="${GITHUB_WORKSPACE}/tests/tlsfuzzer/xfail-mtls" \
              ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_MTLS}" \
              -k "${RUNNER_TEMP}/certs/key-client-pkcs8.pem" \
              -c "${RUNNER_TEMP}/certs/cert-client.pem" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (mTLS) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase I133 — EC / EdDSA client-cert CertificateVerify cert-matrix.
          # Each script presents a matching client identity (ECDSA P-256 /
          # Ed25519) against the same `--verify-client-cert` mTLS listener.
          # 132/0 each; stable since the I133 DER-strictness fix (a malformed-
          # DER ECDSA signature with valid r/s no longer verifies).
          for entry in \
            "test-tls13-ecdsa-in-certificate-verify.py:key-client-ecdsa.pem:cert-client-ecdsa.pem" \
            "test-tls13-eddsa-in-certificate-verify.py:key-client-ed25519.pem:cert-client-ed25519.pem"; do
            s="${entry%%:*}"; rest="${entry#*:}"; k="${rest%%:*}"; c="${rest#*:}"
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-mtls.log"
            echo "=== TLS 1.3 (mTLS EC/EdDSA CV): $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_MTLS}" \
              -k "${RUNNER_TEMP}/certs/${k}" \
              -c "${RUNNER_TEMP}/certs/${c}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (mTLS EC/EdDSA CV) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T107 — PSS-OID subset.
          for s in "${scripts_pss[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-pss.log"
            echo "=== TLS 1.3 (PSS-OID): $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_PSS}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (PSS-OID) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T108 — TLS 1.2 mTLS subset.
          for s in "${scripts_mtls_12[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-mtls-12.log"
            echo "=== TLS 1.2 (mTLS): $s ==="
            XFAIL_DIR="${GITHUB_WORKSPACE}/tests/tlsfuzzer/xfail-mtls-12" \
              ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_MTLS_12}" \
              -k "${RUNNER_TEMP}/certs/key-client-pkcs8.pem" \
              -c "${RUNNER_TEMP}/certs/cert-client.pem" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (TLS 1.2 mTLS) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase T119 — PSK + session-resumption subset. Both scripts
          # run against the dedicated `${HITLS_PORT_PSK}` instance.
          # `psk_dhe_ke` needs PSK material on its own command line;
          # `session-resumption` doesn't take script-side PSK args.
          for s in "${scripts_psk[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-psk.log"
            echo "=== TLS 1.3 (PSK): $s ==="
            psk_args=()
            if [ "$s" = "test-tls13-psk_dhe_ke.py" ]; then
              psk_args=( --psk "${HITLS_PSK_HEX}" --psk-iden "${HITLS_PSK_IDEN}" )
            fi
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_PSK}" \
              "${psk_args[@]}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (PSK) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          # Phase I128 — RFC 8879 certificate compression subset.
          for s in "${scripts_certcomp[@]}"; do
            log="${RUNNER_TEMP}/tlsfuzzer-logs/${s%.py}-certcomp.log"
            echo "=== TLS 1.3 (--cert-compression): $s ==="
            ./tests/tlsfuzzer/run.sh "$s" \
              -h "${HITLS_HOST}" -p "${HITLS_PORT_CERTCOMP}" 2>&1 | tee "${log}"
            rc=${PIPESTATUS[0]}
            grep -E '^(TOTAL|SKIP|PASS|XFAIL|FAIL|XPASS):' "${log}" \
              | head -6 >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo "${s} (--cert-compression) → exit=${rc}" \
              >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            echo >> "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt"
            if [ "$rc" -ne 0 ]; then
              aggregate_exit=1
            fi
          done
          exit "$aggregate_exit"

      - name: Print summary
        if: always()
        run: |
          echo "=== tlsfuzzer aggregate ==="
          cat "${RUNNER_TEMP}/tlsfuzzer-logs/SUMMARY.txt" 2>/dev/null \
            || echo "(no summary)"

      - name: Stop server
        if: always()
        run: |
          for pid in "${SERVER_PID_RSA:-}" "${SERVER_PID_RSA_12:-}" \
                    "${SERVER_PID_ECDSA:-}" "${SERVER_PID_ED25519:-}" \
                    "${SERVER_PID_MTLS:-}" "${SERVER_PID_PSS:-}" \
                    "${SERVER_PID_MTLS_12:-}" "${SERVER_PID_PSK:-}" \
                    "${SERVER_PID_ECDSA_P384:-}" "${SERVER_PID_ECDSA_P521:-}" \
                    "${SERVER_PID_KEYUPDATE:-}" "${SERVER_PID_PHA:-}" \
                    "${SERVER_PID_CERTCOMP:-}"; do
            if [ -n "${pid}" ]; then
              kill "${pid}" 2>/dev/null || true
            fi
          done

      - name: Upload server + tlsfuzzer logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tlsfuzzer-logs
          path: |
            ${{ runner.temp }}/server-rsa-1.3.log
            ${{ runner.temp }}/server-rsa-1.2.log
            ${{ runner.temp }}/server-ecdsa-1.3.log
            ${{ runner.temp }}/server-ed25519-1.3.log
            ${{ runner.temp }}/server-mtls-1.3.log
            ${{ runner.temp }}/server-pss-1.3.log
            ${{ runner.temp }}/server-mtls-1.2.log
            ${{ runner.temp }}/server-ecdsa-p384-1.3.log
            ${{ runner.temp }}/server-ecdsa-p521-1.3.log
            ${{ runner.temp }}/server-keyupdate-1.3.log
            ${{ runner.temp }}/server-pha-1.3.log
            ${{ runner.temp }}/tlsfuzzer-logs/
          retention-days: 14
